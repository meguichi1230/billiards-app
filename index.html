<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビリヤード 9ボール スコア管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(ellipse at center, #1a4a2e 0%, #0d2a1a 60%, #060f0a 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f0c040;
      text-shadow: 0 0 20px rgba(240,192,64,0.5);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8db89a;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    /* ── Setup Screen ── */
    #setup-screen {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(240,192,64,0.3);
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    #setup-screen h2 {
      font-size: 1.1rem;
      color: #f0c040;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    .setup-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
      text-align: left;
    }

    .setup-row label {
      font-size: 0.8rem;
      color: #8db89a;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .setup-row input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .setup-row input:focus { border-color: #f0c040; }

    .race-selector {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .race-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #ccc;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .race-btn.active, .race-btn:hover {
      background: #f0c040;
      border-color: #f0c040;
      color: #000;
      font-weight: bold;
    }

    .start-btn {
      margin-top: 28px;
      background: linear-gradient(135deg, #f0c040, #d4a010);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 14px 48px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(240,192,64,0.4);
    }

    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,192,64,0.5); }
    .start-btn:active { transform: translateY(0); }

    /* ── Game Screen ── */
    #game-screen { display: none; width: 100%; max-width: 700px; }

    .race-info {
      text-align: center;
      font-size: 0.85rem;
      color: #8db89a;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .players-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .player-card {
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .player-card.active-turn {
      border-color: #f0c040;
      box-shadow: 0 0 24px rgba(240,192,64,0.3);
    }

    .player-card.winner {
      border-color: #40e040;
      box-shadow: 0 0 30px rgba(64,224,64,0.4);
      animation: pulse-win 1.5s infinite;
    }

    @keyframes pulse-win {
      0%, 100% { box-shadow: 0 0 20px rgba(64,224,64,0.3); }
      50%       { box-shadow: 0 0 40px rgba(64,224,64,0.6); }
    }

    .turn-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #f0c040;
      color: #000;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      display: none;
    }

    .player-card.active-turn .turn-badge { display: block; }

    .player-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .score-display {
      font-size: 5rem;
      font-weight: 900;
      color: #f0c040;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 16px rgba(240,192,64,0.4);
    }

    .score-target {
      font-size: 0.8rem;
      color: #8db89a;
      margin-bottom: 20px;
    }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      height: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0c040, #d4a010);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .win-btn {
      background: linear-gradient(135deg, #f0c040, #d4a010);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 12px 24px;
      cursor: pointer;
      width: 100%;
      letter-spacing: 1px;
      transition: transform 0.1s, opacity 0.2s;
    }

    .win-btn:hover { transform: scale(1.03); }
    .win-btn:active { transform: scale(0.98); }
    .win-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #ccc;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .ctrl-btn.danger:hover { background: rgba(220,60,60,0.3); border-color: #dc3c3c; color: #ff8080; }

    /* ── History ── */
    .history-section {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .history-section h3 {
      font-size: 0.8rem;
      color: #8db89a;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    #history-list {
      list-style: none;
      max-height: 240px;
      overflow-y: auto;
    }

    #history-list li {
      font-size: 0.85rem;
      color: #bbb;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #history-list li:last-child { border-bottom: none; }

    .history-main-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-main-row .rack-winner { color: #f0c040; font-weight: bold; }

    .history-balls {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .history-ball-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 0.72rem;
      color: #aaa;
      white-space: nowrap;
    }

    .history-ball-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* ── Win Overlay ── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #win-overlay.show { display: flex; }

    .win-modal {
      background: radial-gradient(ellipse at center, #1a4a2e, #0d2a1a);
      border: 2px solid #f0c040;
      border-radius: 20px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(240,192,64,0.4);
      animation: modal-in 0.4s ease;
    }

    @keyframes modal-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-trophy  { font-size: 4rem; margin-bottom: 16px; }
    .win-label   { font-size: 0.9rem; color: #8db89a; letter-spacing: 3px; margin-bottom: 8px; }
    .win-name    { font-size: 2.5rem; font-weight: 900; color: #f0c040; margin-bottom: 24px; }

    .win-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .win-actions button {
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: transform 0.1s;
      border: none;
    }

    .win-actions button:hover { transform: scale(1.04); }
    .btn-rematch  { background: linear-gradient(135deg, #f0c040, #d4a010); color: #000; }
    .btn-newgame  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3) !important; }

    /* ── Ball Recording Modal ── */
    #ball-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #ball-modal.show { display: flex; }

    .bm-inner {
      background: radial-gradient(ellipse at top, #1e3d2a, #0c2218);
      border: 2px solid rgba(240,192,64,0.45);
      border-radius: 20px;
      padding: 26px 24px;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modal-in 0.25s ease;
    }

    .bm-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .bm-title {
      font-size: 1rem;
      font-weight: bold;
      color: #f0c040;
      letter-spacing: 1px;
    }

    .bm-player {
      font-size: 0.8rem;
      color: #8db89a;
      margin-top: 3px;
    }

    .bm-section { margin-bottom: 16px; }

    .bm-label {
      font-size: 0.72rem;
      color: #8db89a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Ball number buttons */
    .ball-grid {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .ball-num-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 3px solid transparent;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ball-num-btn:hover  { transform: scale(1.1); }
    .ball-num-btn.active {
      border-color: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,0.55);
      transform: scale(1.15);
    }

    /* Ball colors (solid) */
    .ball-num-btn[data-num="1"] { background: #FFD700; color: #000; }
    .ball-num-btn[data-num="2"] { background: #1565C0; color: #fff; }
    .ball-num-btn[data-num="3"] { background: #C62828; color: #fff; }
    .ball-num-btn[data-num="4"] { background: #6A1B9A; color: #fff; }
    .ball-num-btn[data-num="5"] { background: #E65100; color: #fff; }
    .ball-num-btn[data-num="6"] { background: #2E7D32; color: #fff; }
    .ball-num-btn[data-num="7"] { background: #5D4037; color: #fff; }
    .ball-num-btn[data-num="8"] { background: #111; color: #fff; border-color: #555; }
    /* 9-ball: yellow stripe (half-white stripe) */
    .ball-num-btn[data-num="9"] {
      background: linear-gradient(to bottom,
        #FFD700 0%, #FFD700 30%,
        #fff    30%, #fff    70%,
        #FFD700 70%, #FFD700 100%);
      color: #000;
    }

    /* Method buttons */
    .method-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .method-btn {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #bbb;
      padding: 8px 13px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.15s;
    }

    .method-btn.active {
      background: rgba(240,192,64,0.22);
      border-color: #f0c040;
      color: #f0c040;
      font-weight: bold;
    }

    .method-btn:hover:not(.active) { background: rgba(255,255,255,0.16); color: #fff; }

    /* Add button */
    .bm-add-btn {
      width: 100%;
      background: rgba(240,192,64,0.13);
      border: 1px dashed rgba(240,192,64,0.45);
      border-radius: 8px;
      color: #f0c040;
      padding: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      margin-bottom: 14px;
      transition: all 0.15s;
    }

    .bm-add-btn:hover { background: rgba(240,192,64,0.24); }

    /* Pending balls area */
    #pending-balls {
      min-height: 38px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .pending-empty {
      font-size: 0.78rem;
      color: #555;
    }

    .ball-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.78rem;
      color: #ddd;
    }

    .ball-tag-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    .ball-tag-remove {
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      padding: 0 2px;
      font-size: 0.85rem;
      line-height: 1;
      transition: color 0.1s;
    }

    .ball-tag-remove:hover { color: #f88; }

    /* Modal action buttons */
    .bm-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .bm-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      border: none;
    }

    .bm-skip-btn {
      background: rgba(255,255,255,0.1) !important;
      color: #aaa !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
    }

    .bm-skip-btn:hover { background: rgba(255,255,255,0.18) !important; color: #fff !important; }

    .bm-confirm-btn {
      background: linear-gradient(135deg, #f0c040, #d4a010);
      color: #000;
    }

    .bm-confirm-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

<h1>🎱 BILLIARDS</h1>
<p class="subtitle">9 BALL SCORE MANAGER</p>

<!-- Setup Screen -->
<div id="setup-screen">
  <h2>ゲーム設定</h2>

  <div class="setup-row">
    <label>プレイヤー 1 の名前</label>
    <input type="text" id="p1-name" placeholder="Player 1" maxlength="20">
  </div>
  <div class="setup-row">
    <label>プレイヤー 2 の名前</label>
    <input type="text" id="p2-name" placeholder="Player 2" maxlength="20">
  </div>

  <div class="setup-row">
    <label>レース（先取ラック数）</label>
    <div class="race-selector" id="race-selector">
      <button class="race-btn" data-race="3">3</button>
      <button class="race-btn active" data-race="5">5</button>
      <button class="race-btn" data-race="7">7</button>
      <button class="race-btn" data-race="9">9</button>
      <button class="race-btn" data-race="11">11</button>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">ゲーム開始</button>
</div>

<!-- Game Screen -->
<div id="game-screen">
  <p class="race-info" id="race-info"></p>

  <div class="players-area">
    <!-- Player 1 -->
    <div class="player-card" id="card-p1">
      <div class="turn-badge">YOUR TURN</div>
        <div class="player-name" id="name-p1">Player 1</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar-p1"></div></div>
      <div class="score-display" id="score-p1">0</div>
      <div class="score-target" id="target-p1">/ 5 ラック</div>
      <button class="win-btn" id="btn-p1" onclick="openBallModal(0)">ラック獲得 ＋1</button>
    </div>
    <!-- Player 2 -->
    <div class="player-card" id="card-p2">
      <div class="turn-badge">YOUR TURN</div>
      <div class="player-name" id="name-p2">Player 2</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="bar-p2"></div></div>
      <div class="score-display" id="score-p2">0</div>
      <div class="score-target" id="target-p2">/ 5 ラック</div>
      <button class="win-btn" id="btn-p2" onclick="openBallModal(1)">ラック獲得 ＋1</button>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="undoLast()">↩ 元に戻す</button>
    <button class="ctrl-btn" onclick="switchTurn()">⇄ ターン交代</button>
    <button class="ctrl-btn danger" onclick="resetGame()">↺ リセット</button>
    <button class="ctrl-btn danger" onclick="goSetup()">⚙ 設定に戻る</button>
  </div>

  <div class="history-section">
    <h3>📋 ラック履歴</h3>
    <ul id="history-list"><li style="color:#666; text-align:center;">まだ記録がありません</li></ul>
  </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
  <div class="win-modal">
    <div class="win-trophy">🏆</div>
    <div class="win-label">WINNER</div>
    <div class="win-name" id="win-name"></div>
    <div id="win-score" style="color:#8db89a; font-size:1rem; margin-bottom:28px;"></div>
    <div class="win-actions">
      <button class="btn-rematch" onclick="rematch()">再戦 (同設定)</button>
      <button class="btn-newgame" onclick="goSetup()">新しいゲーム</button>
    </div>
  </div>
</div>

<!-- Ball Recording Modal -->
<div id="ball-modal">
  <div class="bm-inner">

    <div class="bm-header">
      <div>
        <div class="bm-title" id="bm-title">ラック 1 の記録</div>
        <div class="bm-player" id="bm-player">Player 1 が獲得</div>
      </div>
    </div>

    <!-- Ball number -->
    <div class="bm-section">
      <div class="bm-label">落としたボール番号</div>
      <div class="ball-grid" id="ball-grid"></div>
    </div>

    <!-- Method -->
    <div class="bm-section">
      <div class="bm-label">落とし方</div>
      <div class="method-row" id="method-row">
        <button class="method-btn" data-method="ブレイク" onclick="selectMethod(this)">ブレイク</button>
        <button class="method-btn active" data-method="通常" onclick="selectMethod(this)">通常ショット</button>
        <button class="method-btn" data-method="フリーボール" onclick="selectMethod(this)">フリーボール</button>
        <button class="method-btn" data-method="プッシュアウト後" onclick="selectMethod(this)">プッシュアウト後</button>
      </div>
    </div>

    <!-- Add button -->
    <button class="bm-add-btn" onclick="addBallRecord()">＋ ボールを追加する</button>

    <!-- Recorded balls -->
    <div class="bm-section">
      <div class="bm-label">追加済みボール</div>
      <div id="pending-balls"><span class="pending-empty">まだ追加されていません</span></div>
    </div>

    <!-- Actions -->
    <div class="bm-actions">
      <button class="bm-skip-btn" onclick="confirmRack(true)">記録なしで確定</button>
      <button class="bm-confirm-btn" onclick="confirmRack(false)">ラック確定 ✓</button>
    </div>

  </div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────
  let state = {
    names: ['Player 1', 'Player 2'],
    scores: [0, 0],
    race: 5,
    currentTurn: 0,
    history: [],   // each entry: { scores, turn, rack, winner, balls[] }
    gameOver: false
  };

  let pendingWin   = null;  // { playerIdx }
  let pendingBalls = [];    // [{ball, method}] being built in modal

  // Ball color map
  const BALL_COLORS = {
    1: '#FFD700',
    2: '#1565C0',
    3: '#C62828',
    4: '#6A1B9A',
    5: '#E65100',
    6: '#2E7D32',
    7: '#5D4037',
    8: '#111111',
    9: '#FFD700'  // stripe – same yellow
  };

  // Method short labels for history chips
  const METHOD_SHORT = {
    'ブレイク':      'BRK',
    '通常':          '通常',
    'フリーボール':  'FREE',
    'プッシュアウト後': 'PSH'
  };

  // ─── Race selector ───────────────────────────────────────
  document.querySelectorAll('.race-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  function getSelectedRace() {
    const active = document.querySelector('.race-btn.active');
    return active ? parseInt(active.dataset.race) : 5;
  }

  // Build 1–9 ball buttons dynamically
  (function buildBallGrid() {
    const grid = document.getElementById('ball-grid');
    for (let n = 1; n <= 9; n++) {
      const btn = document.createElement('button');
      btn.className = 'ball-num-btn';
      btn.dataset.num = n;
      btn.textContent = n;
      btn.onclick = () => selectBall(btn);
      grid.appendChild(btn);
    }
  })();

  // ─── Setup ───────────────────────────────────────────────
  function startGame() {
    const p1 = document.getElementById('p1-name').value.trim() || 'Player 1';
    const p2 = document.getElementById('p2-name').value.trim() || 'Player 2';
    state.names    = [p1, p2];
    state.scores   = [0, 0];
    state.race     = getSelectedRace();
    state.currentTurn = 0;
    state.history  = [];
    state.gameOver = false;
    renderGame();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'block';
  }

  // ─── Render ──────────────────────────────────────────────
  function renderGame() {
    document.getElementById('race-info').textContent =
      `RACE TO ${state.race} — ${state.names[0]} vs ${state.names[1]}`;

    for (let i = 0; i < 2; i++) {
      const id = i === 0 ? 'p1' : 'p2';
      document.getElementById(`name-${id}`).textContent   = state.names[i];
      document.getElementById(`score-${id}`).textContent  = state.scores[i];
      document.getElementById(`target-${id}`).textContent = `/ ${state.race} ラック`;
      const pct = (state.scores[i] / state.race) * 100;
      document.getElementById(`bar-${id}`).style.width = Math.min(pct, 100) + '%';
      const card = document.getElementById(`card-${id}`);
      card.classList.toggle('active-turn', state.currentTurn === i && !state.gameOver);
      card.classList.remove('winner');
      document.getElementById(`btn-${id}`).disabled = state.gameOver;
    }
    renderHistory();
  }

  // ─── Ball Recording Modal ────────────────────────────────
  function openBallModal(playerIdx) {
    if (state.gameOver) return;
    pendingWin   = { playerIdx };
    pendingBalls = [];

    const rackNum = state.scores[0] + state.scores[1] + 1;
    document.getElementById('bm-title').textContent  = `ラック ${rackNum} の記録`;
    document.getElementById('bm-player').textContent = `${state.names[playerIdx]} が獲得`;

    // Reset ball selection
    document.querySelectorAll('.ball-num-btn').forEach(b => b.classList.remove('active'));
    // Default method = 通常
    document.querySelectorAll('.method-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.method === '通常');
    });

    renderPendingBalls();
    document.getElementById('ball-modal').classList.add('show');
  }

  function selectBall(btn) {
    document.querySelectorAll('.ball-num-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function selectMethod(btn) {
    document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function getSelectedBallNum() {
    const active = document.querySelector('.ball-num-btn.active');
    return active ? parseInt(active.dataset.num) : null;
  }

  function getSelectedMethod() {
    const active = document.querySelector('.method-btn.active');
    return active ? active.dataset.method : null;
  }

  function addBallRecord() {
    const ball   = getSelectedBallNum();
    const method = getSelectedMethod();
    if (!ball)   { alert('ボール番号を選んでください'); return; }
    if (!method) { alert('落とし方を選んでください');   return; }
    pendingBalls.push({ ball, method });
    // Deselect ball after adding
    document.querySelectorAll('.ball-num-btn').forEach(b => b.classList.remove('active'));
    renderPendingBalls();
  }

  function removePendingBall(idx) {
    pendingBalls.splice(idx, 1);
    renderPendingBalls();
  }

  function renderPendingBalls() {
    const container = document.getElementById('pending-balls');
    if (pendingBalls.length === 0) {
      container.innerHTML = '<span class="pending-empty">まだ追加されていません</span>';
      return;
    }
    container.innerHTML = pendingBalls.map((b, i) => `
      <span class="ball-tag">
        <span class="ball-tag-dot" style="background:${BALL_COLORS[b.ball]};"></span>
        ${b.ball}番 · ${b.method}
        <button class="ball-tag-remove" onclick="removePendingBall(${i})">✕</button>
      </span>
    `).join('');
  }

  // skip=true → record without ball data
  function confirmRack(skip) {
    if (!pendingWin) return;
    const { playerIdx } = pendingWin;
    document.getElementById('ball-modal').classList.remove('show');

    const balls = skip ? [] : [...pendingBalls];
    state.history.push({
      scores: [...state.scores],
      turn:   state.currentTurn,
      rack:   state.scores[0] + state.scores[1] + 1,
      winner: playerIdx,
      balls
    });

    state.scores[playerIdx]++;
    state.currentTurn = playerIdx === 0 ? 1 : 0;

    pendingWin   = null;
    pendingBalls = [];

    if (state.scores[playerIdx] >= state.race) {
      state.gameOver = true;
      renderGame();
      showWin(playerIdx);
    } else {
      renderGame();
    }
  }

  // ─── Win overlay ─────────────────────────────────────────
  function showWin(idx) {
    const card = document.getElementById(idx === 0 ? 'card-p1' : 'card-p2');
    card.classList.add('winner');
    document.getElementById('win-name').textContent  = state.names[idx];
    document.getElementById('win-score').textContent = `${state.scores[0]} — ${state.scores[1]}`;
    document.getElementById('win-overlay').classList.add('show');
  }

  // ─── Controls ────────────────────────────────────────────
  function undoLast() {
    if (state.history.length === 0) return;
    const last = state.history.pop();
    state.scores   = [...last.scores];
    state.currentTurn = last.turn;
    state.gameOver = false;
    document.getElementById('win-overlay').classList.remove('show');
    renderGame();
  }

  function switchTurn() {
    if (state.gameOver) return;
    state.currentTurn = state.currentTurn === 0 ? 1 : 0;
    renderGame();
  }

  function resetGame() {
    if (!confirm('スコアをリセットしますか？')) return;
    state.scores      = [0, 0];
    state.currentTurn = 0;
    state.history     = [];
    state.gameOver    = false;
    renderGame();
  }

  function rematch() {
    document.getElementById('win-overlay').classList.remove('show');
    state.scores      = [0, 0];
    state.currentTurn = 0;
    state.history     = [];
    state.gameOver    = false;
    renderGame();
  }

  function goSetup() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('game-screen').style.display  = 'none';
    document.getElementById('setup-screen').style.display = 'block';
  }

  // ─── History ─────────────────────────────────────────────
  function renderHistory() {
    const list = document.getElementById('history-list');
    if (state.history.length === 0) {
      list.innerHTML = '<li style="color:#666; text-align:center;">まだ記録がありません</li>';
      return;
    }
    list.innerHTML = '';
    [...state.history].reverse().forEach(h => {
      // Scores AFTER this rack
      const hIdx = state.history.indexOf(h);
      const afterScores = hIdx + 1 < state.history.length
        ? state.history[hIdx + 1].scores
        : state.scores;

      const winnerIdx = (h.winner !== undefined)
        ? h.winner
        : (afterScores[0] > h.scores[0] ? 0 : 1);

      // Ball chips HTML
      let ballsHtml = '';
      if (h.balls && h.balls.length > 0) {
        ballsHtml = '<div class="history-balls">' +
          h.balls.map(b => `
            <span class="history-ball-chip">
              <span class="history-ball-dot" style="background:${BALL_COLORS[b.ball]};"></span>
              ${b.ball}番&nbsp;<span style="color:#777;">${METHOD_SHORT[b.method] || b.method}</span>
            </span>
          `).join('') +
        '</div>';
      }

      const li = document.createElement('li');
      li.innerHTML = `
        <div class="history-main-row">
          <span>ラック ${h.rack}</span>
          <span class="rack-winner">${state.names[winnerIdx]} 獲得</span>
          <span>${afterScores[0]} — ${afterScores[1]}</span>
        </div>
        ${ballsHtml}
      `;
      list.appendChild(li);
    });
  }
</script>
</body>
</html>
